<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пригоди Тараса</title>
    <style>
        body { margin: 0; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; color: white; }
        .stats { font-size: 24px; font-weight: bold; margin: 10px; color: #f0db4f; text-shadow: 2px 2px #000; }
        canvas { background: linear-gradient(#4facfe 0%, #00f2fe 100%); border: 4px solid #fff; border-radius: 12px; max-width: 98vw; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: flex; gap: 25px; margin-top: 20px; padding-bottom: 20px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.15); border: 3px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; user-select: none; -webkit-user-select: none; }
        .btn:active { background: #f0db4f; color: #000; transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="stats">Скарби Тараса: <span id="score">0</span></div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">↑</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

// Звуковий движок (Web Audio API)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, type, duration) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

canvas.width = 800;
canvas.height = 500;

let score = 0;
const player = { x: 50, y: 400, width: 35, height: 45, dx: 0, dy: 0, speed: 6, jump: -16, grounded: false };

// Набагато більше платформ
const platforms = [
    { x: 0, y: 480, width: 800, height: 20 }, // Земля
    { x: 100, y: 380, width: 120, height: 15 },
    { x: 300, y: 330, width: 120, height: 15 },
    { x: 550, y: 350, width: 150, height: 15 },
    { x: 400, y: 240, width: 120, height: 15 },
    { x: 150, y: 200, width: 150, height: 15 },
    { x: 600, y: 150, width: 100, height: 15 },
    { x: 350, y: 100, width: 150, height: 15 },
    { x: 50, y: 80, width: 100, height: 15 }
];

// Багато монет
let coins = [
    { x: 150, y: 350, collected: false }, { x: 350, y: 300, collected: false },
    { x: 600, y: 320, collected: false }, { x: 450, y: 210, collected: false },
    { x: 200, y: 170, collected: false }, { x: 650, y: 120, collected: false },
    { x: 400, y: 70, collected: false }, { x: 80, y: 50, collected: false }
];

const keys = { Left: false, Right: false, Up: false };

// Сенсорне керування
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; if(audioCtx.state === 'suspended') audioCtx.resume(); };
    el.ontouchend = () => keys[key] = false;
};
setupBtn('leftBtn', 'Left'); setupBtn('rightBtn', 'Right'); setupBtn('jumpBtn', 'Up');

function update() {
    if (keys.Right) player.dx = player.speed;
    else if (keys.Left) player.dx = -player.speed;
    else player.dx *= 0.85;

    if (keys.Up && player.grounded) {
        player.dy = player.jump;
        player.grounded = false;
        playSound(400, 'square', 0.1); // Звук стрибка
    }

    player.dy += 0.8;
    player.x += player.dx;
    player.y += player.dy;

    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.width && player.x + player.width > p.x &&
            player.y < p.y + p.height && player.y + player.height > p.y) {
            if (player.dy > 0 && player.y + player.height - player.dy <= p.y) {
                player.y = p.y - player.height;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    coins.forEach(coin => {
        if (!coin.collected && player.x < coin.x + 20 && player.x + player.width > coin.x &&
            player.y < coin.y + 20 && player.y + player.height > coin.y) {
            coin.collected = true;
            score += 10;
            scoreElement.innerText = score;
            playSound(800, 'sine', 0.1); // Звук монети
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Платформи з градієнтом
    platforms.forEach(p => {
        ctx.fillStyle = '#2d6a4f';
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.fillStyle = '#40916c';
        ctx.fillRect(p.x, p.y, p.width, 5);
    });

    // Монети з ефектом сяйва
    ctx.fillStyle = '#ffd700';
    coins.forEach(coin => {
        if (!coin.collected) {
            ctx.beginPath();
            ctx.arc(coin.x + 10, coin.y + 10, 10, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();
        }
    });

    // Тарас
    ctx.fillStyle = '#e63946';
    ctx.fillRect(player.x, player.y, player.width, player.height);
    ctx.fillStyle = 'white'; // Очі
    ctx.fillRect(player.x + (player.dx >= 0 ? 20 : 5), player.y + 10, 7, 7);
}

update();
</script>
</body>
</html>
