<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пригоди Тараса: UA Edition</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin: 0; background: #0f0c29; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; color: white; overflow: hidden; }
        .header { display: flex; justify-content: space-between; width: 95vw; padding: 10px; align-items: center; z-index: 10; }
        .stats { font-size: 18px; font-weight: bold; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .menu-btns { display: flex; gap: 10px; align-items: center; }
        .info-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid #ffd700; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .buy-btn { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px #005588; }
        canvas { border: 4px solid #ffd700; border-radius: 15px; max-width: 98vw; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .controls { display: flex; gap: 25px; margin-top: 15px; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 3px solid #ffd700; border-radius: 50%; color: #ffd700; display: flex; align-items: center; justify-content: center; font-size: 35px; user-select: none; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background: linear-gradient(#1e3c72, #2a5298); margin: 10% auto; padding: 20px; border: 2px solid #ffd700; width: 85%; border-radius: 15px; text-align: center; line-height: 1.6; }
        .close-btn { background: #ffd700; color: #000; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #timer { color: #00ff00; font-weight: bold; visibility: hidden; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; border: 1px solid #00ff00; }
        #level-info { position: absolute; top: 50%; font-size: 40px; font-weight: bold; color: #ffd700; display: none; text-shadow: 0 0 10px #000; z-index: 50; }
    </style>
</head>
<body>
    <div id="level-info">РІВЕНЬ 1</div>
    
    <div id="rulesModal" class="modal">
        <div class="modal-content">
            <h2>📜 Нові правила UA</h2>
            <p style="text-align: left;">
                • <b>Рівень 2</b>: Назбирай <b>1000 очок</b> для порталу.<br>
                • <b>Рівень 3</b>: Назбирай <b>2000 очок</b> загалом.<br>
                • <b>Вивід</b>: Досягни <b>5000 очок</b> для фіналу!<br>
                • Нагорода виплачується в <b>монетах UA</b>.<br>
                • Хмара забирає 50 очок! Купуй Щит для захисту.
            </p>
            <button class="close-btn" onclick="closeRules()">ПОЇХАЛИ!</button>
        </div>
    </div>

    <div class="header">
        <div class="menu-btns">
            <button class="info-btn" onclick="openRules()">?</button>
            <div class="stats">UA: <span id="score">0</span> | Рівень: <span id="lvl">1</span>/3</div>
        </div>
        <div id="timer">🛡️ 30с</div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
            <div id="ton-connect-btn"></div>
            <button class="buy-btn" id="payBtn" onclick="sendTransaction()">🛡️ Безсмертя (0.01 TON)</button>
        </div>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">↑</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

<script>
function openRules() { document.getElementById('rulesModal').style.display = "block"; }
function closeRules() { document.getElementById('rulesModal').style.display = "none"; }

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://leslav2025.github.io/Taras/tonconnect-manifest.json',
    buttonRootId: 'ton-connect-btn'
});

tonConnectUI.onStatusChange(wallet => {
    document.getElementById('payBtn').style.display = wallet ? 'block' : 'none';
});

async function sendTransaction() {
    const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 60,
        messages: [{ address: "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw", amount: "10000000" }]
    };
    try {
        await tonConnectUI.sendTransaction(transaction);
        activateShield();
    } catch (e) { alert("Оплата скасована"); }
}

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const levelElement = document.getElementById('lvl');
const timerElement = document.getElementById('timer');
const lvlInfo = document.getElementById('level-info');

let audioCtx;
function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(freq, type, duration, vol = 0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

canvas.width = 800; canvas.height = 400;
let score = 0;
let level = 1;
let isInvincible = false;
let shieldTimer = 0;
let portalActive = false;

const player = { x: 50, y: 300, width: 32, height: 45, dx: 0, dy: 0, speed: 6.5, jump: -16, grounded: false };
const enemy = { x: 400, y: 205, width: 35, height: 35, speed: 3.5, range: 180, startX: 400 };
const portal = { x: 720, y: 80, width: 45, height: 60 };

const backgrounds = [
    'linear-gradient(#1e3c72 0%, #2a5298 100%)',
    'linear-gradient(#0f0c29 0%, #302b63 100%)',
    'linear-gradient(#2c3e50 0%, #000000 100%)'
];

const platforms = [
    { x: 0, y: 380, width: 800, height: 20, color: '#4b3621' },
    { x: 100, y: 280, width: 150, height: 15, color: '#ffd700' }, 
    { x: 350, y: 240, width: 250, height: 15, color: '#ffd700' },
    { x: 150, y: 140, width: 120, height: 15, color: '#ffd700' },
    { x: 550, y: 140, width: 150, height: 15, color: '#ffd700' }
];

let coins = [{x: 170, y: 240}, {x: 470, y: 200}, {x: 200, y: 100}, {x: 600, y: 100}].map(c => ({...c, collected: false}));

function activateShield() {
    isInvincible = true; shieldTimer = 30;
    timerElement.style.visibility = 'visible';
    playSound(880, 'triangle', 0.5, 0.2);
    let countdown = setInterval(() => {
        shieldTimer--;
        timerElement.innerText = `🛡️ ${shieldTimer}с`;
        if (shieldTimer <= 0) { isInvincible = false; timerElement.style.visibility = 'hidden'; clearInterval(countdown); }
    }, 1000);
}

function startNextLevel() {
    if (level >= 3 && score >= 5000) { showVictoryScreen(); return; }
    level++;
    levelElement.innerText = level;
    portalActive = false;
    player.x = 50; player.y = 300;
    enemy.speed += 1.5;
    canvas.style.background = backgrounds[(level-1) % backgrounds.length];
    lvlInfo.innerText = "РІВЕНЬ " + level;
    lvlInfo.style.display = 'block';
    setTimeout(() => lvlInfo.style.display = 'none', 2000);
    playSound(1200, 'triangle', 0.5);
}

async function showVictoryScreen() {
    const walletAddress = tonConnectUI.account ? tonConnectUI.account.address : "Не підключено";
    const messageText = encodeURIComponent(
        `🏆 ПЕРЕМОГА: ТАРАС UA\n` +
        `Рахунок: ${score} очок\n` +
        `Гаманець: ${walletAddress}\n` +
        `Прошу виплатити нагороду в монетах UA.`
    );
    const botLink = `https://t.me/tokenpist_bot?text=${messageText}`;

    const victoryDiv = document.createElement('div');
    victoryDiv.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:200; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; color:#ffd700; padding: 20px;";
    victoryDiv.innerHTML = `
        <h1 style="font-size:40px; margin:0;">🇺🇦 КАНІКУЛИ!</h1>
        <p style="font-size:20px; color:white;">Ви назбирали ${score} очок!</p>
        <div style="display:flex; flex-direction:column; gap:15px; margin-top:20px; width:100%; max-width:300px;">
            <a href="${botLink}" target="_blank" style="text-decoration:none; background:#0088cc; color:white; padding:15px; border-radius:15px; font-weight:bold; font-size:18px; box-shadow: 0 5px #005588;">ВИВЕСТИ В UA</a>
            <button onclick="location.reload()" style="background:#ffd700; color:black; border:none; padding:15px; border-radius:15px; font-weight:bold; font-size:18px; cursor:pointer;">ЩЕ РАЗ</button>
        </div>
    `;
    document.body.appendChild(victoryDiv);
}

const keys = { Left: false, Right: false, Up: false };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); initAudio(); keys[key] = true; });
    el.addEventListener('touchend', () => keys[key] = false);
};
setupBtn('leftBtn','Left'); setupBtn('rightBtn','Right'); setupBtn('jumpBtn','Up');

function update() {
    if (keys.Right) player.dx = player.speed;
    else if (keys.Left) player.dx = -player.speed;
    else player.dx *= 0.85;
    if (keys.Up && player.grounded) { player.dy = player.jump; player.grounded = false; playSound(440, 'sine', 0.1); }
    player.dy += 0.85; player.x += player.dx; player.y += player.dy;
    if (player.x < 0) player.x = 0; if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
    enemy.x += enemy.speed;
    if (enemy.x > enemy.startX + enemy.range || enemy.x < enemy.startX) enemy.speed *= -1;

    if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
        player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
        if (isInvincible) { enemy.x = -200; setTimeout(() => { enemy.x = enemy.startX; }, 3000); }
        else { score = Math.max(0, score - 50); scoreElement.innerText = score; player.x = 50; player.y = 300; playSound(150, 'sawtooth', 0.3); }
    }

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.width && player.x + player.width > p.x &&
            player.y < p.y + p.height && player.y + player.height > p.y) {
            if (player.dy > 0 && player.y + player.height - player.dy <= p.y) {
                player.y = p.y - player.height; player.dy = 0; player.grounded = true;
            }
        }
    });

    coins.forEach(coin => {
        if (!coin.collected && player.x < coin.x+20 && player.x+player.width > coin.x && player.y < coin.y+20 && player.y+player.height > coin.y) {
            coin.collected = true; score += 10; scoreElement.innerText = score; playSound(1000, 'sine', 0.05);
            setTimeout(() => { coin.collected = false; }, 2000); // Монети з'являються знову
        }
    });
    
    // ЛОГІКА ПОРТАЛУ
    if (level === 1 && score >= 1000) portalActive = true;
    if (level === 2 && score >= 2000) portalActive = true;
    if (level === 3 && score >= 5000) portalActive = true;

    if (portalActive && player.x < portal.x + portal.width && player.x + player.width > portal.x &&
        player.y < portal.y + portal.height && player.y + portal.height > portal.y) { startNextLevel(); }
    
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    platforms.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.width, p.height); });
    ctx.fillStyle = '#ffd700';
    coins.forEach(c => { if(!c.collected) { ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, Math.PI*2); ctx.fill(); } });
    
    if (portalActive) {
        ctx.fillStyle = '#00ffcc'; ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
        ctx.fillRect(portal.x, portal.y, portal.width, portal.height);
        ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.fillText("ПОРТАЛ", portal.x, portal.y - 10);
    }
    
    ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.ellipse(enemy.x+17, enemy.y+17, 20, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = isInvincible ? (Math.sin(Date.now()/50)*0.5+0.5) : 1.0;
    ctx.fillStyle = '#0057b7'; ctx.fillRect(player.x, player.y + 22, player.width, 23);
    ctx.fillStyle = '#ffd700'; ctx.fillRect(player.x, player.y, player.width, 22);
    ctx.globalAlpha = 1.0;
}
canvas.style.background = backgrounds[0];
update();
</script>
</body>
</html>
