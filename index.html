<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пригоди Тараса: UA Edition</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin: 0; background: #0f0c29; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; color: white; overflow: hidden; }
        .header { display: flex; justify-content: space-between; width: 95vw; padding: 10px; align-items: center; z-index: 10; }
        .stats { font-size: 20px; font-weight: bold; color: #ffd700; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .buy-btn { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px #005588; transition: 0.2s; }
        .buy-btn:active { transform: translateY(2px); box-shadow: 0 2px #005588; }
        canvas { background: linear-gradient(#1e3c72 0%, #2a5298 100%); border: 4px solid #ffd700; border-radius: 15px; max-width: 98vw; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
        .controls { display: flex; gap: 25px; margin-top: 15px; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 3px solid #ffd700; border-radius: 50%; color: #ffd700; display: flex; align-items: center; justify-content: center; font-size: 35px; user-select: none; -webkit-user-select: none; }
        .btn:active { background: rgba(255, 215, 0, 0.4); transform: scale(0.9); }
        #timer { color: #00ff00; font-weight: bold; visibility: hidden; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; border: 1px solid #00ff00; }
    </style>
</head>
<body>
    <div class="header">
        <div class="stats">Монети: <span id="score">0</span></div>
        <div id="timer">ЩИТ: 30с</div>
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
            <div id="ton-connect-btn"></div>
            <button class="buy-btn" id="payBtn" onclick="sendTransaction()">🛡️ Безсмертя 30с (0.01 TON)</button>
        </div>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">↑</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

<script>
// --- Налаштування TON ---
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://leslav2025.github.io/Taras/tonconnect-manifest.json',
    buttonRootId: 'ton-connect-btn'
});

tonConnectUI.onStatusChange(wallet => {
    document.getElementById('payBtn').style.display = wallet ? 'block' : 'none';
});

async function sendTransaction() {
    const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 60,
        messages: [{ address: "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw", amount: "10000000" }]
    };
    try {
        await tonConnectUI.sendTransaction(transaction);
        activateShield();
    } catch (e) { alert("Оплату не виконано"); }
}

// --- Логіка гри ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');

// Виправлення звуку
let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(freq, type, duration, vol = 0.1) {
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

canvas.width = 800; canvas.height = 400;
let score = 0;
let isInvincible = false;
let shieldTimer = 0;

const player = { x: 50, y: 300, width: 32, height: 45, dx: 0, dy: 0, speed: 6.5, jump: -16, grounded: false };
const enemy = { x: 400, y: 205, width: 35, height: 35, speed: 3.5, range: 180, startX: 400 };

const platforms = [
    { x: 0, y: 380, width: 800, height: 20, color: '#4b3621' }, // Земля
    { x: 100, y: 280, width: 150, height: 15, color: '#ffd700' }, 
    { x: 350, y: 240, width: 250, height: 15, color: '#ffd700' },
    { x: 150, y: 140, width: 120, height: 15, color: '#ffd700' },
    { x: 550, y: 140, width: 120, height: 15, color: '#ffd700' }
];

let coins = [
    {x: 170, y: 240}, {x: 470, y: 200}, {x: 200, y: 100}, {x: 600, y: 100}, {x: 700, y: 340}
].map(c => ({...c, collected: false}));

function activateShield() {
    isInvincible = true;
    shieldTimer = 30; // Збільшено до 30 секунд
    timerElement.style.visibility = 'visible';
    playSound(880, 'triangle', 0.5, 0.2);
    
    let countdown = setInterval(() => {
        shieldTimer--;
        timerElement.innerText = `ЩИТ: ${shieldTimer}с`;
        if (shieldTimer <= 0) {
            isInvincible = false;
            timerElement.style.visibility = 'hidden';
            clearInterval(countdown);
        }
    }, 1000);
}

const keys = { Left: false, Right: false, Up: false };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        initAudio(); 
        keys[key] = true; 
    });
    el.addEventListener('touchend', () => keys[key] = false);
};
setupBtn('leftBtn','Left'); setupBtn('rightBtn','Right'); setupBtn('jumpBtn','Up');

function update() {
    if (keys.Right) player.dx = player.speed;
    else if (keys.Left) player.dx = -player.speed;
    else player.dx *= 0.85;

    if (keys.Up && player.grounded) { 
        player.dy = player.jump; 
        player.grounded = false; 
        playSound(440, 'sine', 0.1);
    }

    player.dy += 0.85; player.x += player.dx; player.y += player.dy;
    if (player.x < 0) player.x = 0;
    if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    enemy.x += enemy.speed;
    if (enemy.x > enemy.startX + enemy.range || enemy.x < enemy.startX) enemy.speed *= -1;

    // Перевірка ворога
    if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
        player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
        if (isInvincible) {
            enemy.x = -100;
            setTimeout(() => { enemy.x = enemy.startX; }, 3000);
            playSound(1200, 'square', 0.1);
        } else {
            score = 0; scoreElement.innerText = score;
            player.x = 50; player.y = 300;
            playSound(150, 'sawtooth', 0.4);
        }
    }

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.width && player.x + player.width > p.x &&
            player.y < p.y + p.height && player.y + player.height > p.y) {
            if (player.dy > 0 && player.y + player.height - player.dy <= p.y) {
                player.y = p.y - player.height; player.dy = 0; player.grounded = true;
            }
        }
    });

    coins.forEach(coin => {
        if (!coin.collected && player.x < coin.x + 20 && player.x + player.width > coin.x &&
            player.y < coin.y + 20 && player.y + player.height > coin.y) {
            coin.collected = true; score += 10; scoreElement.innerText = score;
            playSound(1000, 'sine', 0.05);
        }
    });
    
    // Нескінченні монети (оновлюються самі)
    if (coins.filter(c => !c.collected).length === 0) {
        setTimeout(() => coins.forEach(c => c.collected = false), 2000);
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Платформи (Кольори прапора)
    platforms.forEach(p => { 
        ctx.fillStyle = p.color; 
        ctx.fillRect(p.x, p.y, p.width, p.height);
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.strokeRect(p.x, p.y, p.width, p.height);
    });

    // Монети (Золоті з обідком)
    ctx.fillStyle = '#ffd700';
    coins.forEach(c => { 
        if(!c.collected) { 
            ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 10, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();
        } 
    });

    // Ворог (Зла хмара)
    ctx.fillStyle = '#7f8c8d';
    ctx.beginPath(); ctx.ellipse(enemy.x+17, enemy.y+17, 20, 15, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'red'; ctx.fillRect(enemy.x+10, enemy.y+12, 4, 4); ctx.fillRect(enemy.x+20, enemy.y+12, 4, 4);

    // Тарас (Синьо-жовтий герой)
    ctx.globalAlpha = isInvincible ? (Math.sin(Date.now()/50)*0.5+0.5) : 1.0;
    // Штани (Сині)
    ctx.fillStyle = '#0057b7'; ctx.fillRect(player.x, player.y + 22, player.width, 23);
    // Сорочка (Жовта)
    ctx.fillStyle = '#ffd700'; ctx.fillRect(player.x, player.y, player.width, 22);
    
    if (isInvincible) { 
        ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4; 
        ctx.strokeRect(player.x-6, player.y-6, player.width+12, player.height+12); 
    }
    ctx.globalAlpha = 1.0;
}
update();
</script>
</body>
</html>
