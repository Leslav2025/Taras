<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гра Тарас - Платформер</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #a5f3fc; box-shadow: 0 0 20px rgba(0,0,0,0.5); margin: 20px auto; border-radius: 8px; }
        .info { color: white; text-align: center; }
    </style>
</head>
<body>
    <div class="info">
        <h1>Пригоди Тараса</h1>
        <p>Стрілки — рух, Пробіл — стрибок</p>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 400;

const config = {
    gravity: 0.6,
    friction: 0.8
};

const player = {
    x: 100,
    y: 300,
    width: 32,
    height: 40,
    color: '#e63946',
    dx: 0,
    dy: 0,
    speed: 5,
    jumpForce: -12,
    grounded: false
};

// Платформи (наші перешкоди)
const platforms = [
    { x: 0, y: 380, width: 800, height: 20 },   // Підлога
    { x: 200, y: 280, width: 150, height: 20 },
    { x: 450, y: 200, width: 150, height: 20 },
    { x: 100, y: 150, width: 100, height: 20 }
];

const keys = {};

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function checkCollision(obj1, obj2) {
    return obj1.x < obj2.x + obj2.width &&
           obj1.x + obj1.width > obj2.x &&
           obj1.y < obj2.y + obj2.height &&
           obj1.y + obj1.height > obj2.y;
}

function update() {
    // Горизонтальний рух
    if (keys['ArrowRight']) player.dx = player.speed;
    else if (keys['ArrowLeft']) player.dx = -player.speed;
    else player.dx *= config.friction;

    // Стрибок
    if (keys['Space'] && player.grounded) {
        player.dy = player.jumpForce;
        player.grounded = false;
    }

    // Гравітація
    player.dy += config.gravity;
    
    // Рух по осях
    player.x += player.dx;
    player.y += player.dy;

    // Перевірка колізій з платформами
    player.grounded = false;
    for (let plat of platforms) {
        if (checkCollision(player, plat)) {
            // Якщо падаємо зверху на платформу
            if (player.dy > 0 && player.y + player.height - player.dy <= plat.y) {
                player.y = plat.y - player.height;
                player.dy = 0;
                player.grounded = true;
            }
        }
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Малюємо платформи
    ctx.fillStyle = '#2d6a4f';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));

    // Малюємо Тараса (поки що як стильний прямокутник)
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
    
    // Очі Тараса (щоб знати куди він дивиться)
    ctx.fillStyle = 'white';
    const eyeOffset = player.dx >= 0 ? 20 : 5;
    ctx.fillRect(player.x + eyeOffset, player.y + 10, 8, 8);
}

update();
</script>
</body>
</html>
