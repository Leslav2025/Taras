<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taras TON Game</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a2e; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; color: white; overflow: hidden; }
        .header { display: flex; justify-content: space-between; width: 95vw; padding: 10px; align-items: center; }
        .stats { font-size: 18px; font-weight: bold; color: #f0db4f; }
        #ton-connect-btn { margin-bottom: 5px; }
        .buy-btn { background: #0088cc; color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; box-shadow: 0 4px #005588; }
        canvas { background: linear-gradient(#4facfe 0%, #00f2fe 100%); border: 3px solid #fff; border-radius: 12px; max-width: 98vw; }
        .controls { display: flex; gap: 20px; margin-top: 15px; }
        .btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 35px; user-select: none; }
        #timer { color: #00ff00; font-weight: bold; visibility: hidden; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="stats">Скарби: <span id="score">0</span></div>
        <div id="timer">ЩИТ: 10с</div>
        <div style="display: flex; flex-direction: column; align-items: flex-end;">
            <div id="ton-connect-btn"></div>
            <button class="buy-btn" id="payBtn" onclick="sendTransaction()">🛡️ Купити Щит (0.01 TON)</button>
        </div>
    </div>
    <canvas id="game"></canvas>
    <div class="controls">
        <div class="btn" id="leftBtn">←</div>
        <div class="btn" id="jumpBtn">↑</div>
        <div class="btn" id="rightBtn">→</div>
    </div>

<script>
// Ініціалізація TON Connect UI
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: 'https://leslav2025.github.io/Taras/tonconnect-manifest.json',
    buttonRootId: 'ton-connect-btn'
});

// Слідкуємо за підключенням гаманця
tonConnectUI.onStatusChange(wallet => {
    document.getElementById('payBtn').style.display = wallet ? 'block' : 'none';
});

async function sendTransaction() {
    const transaction = {
        validUntil: Math.floor(Date.now() / 1000) + 60,
        messages: [
            {
                address: "UQDXq1iAqu88tVRG62_k03kAXELu_1gzRBMye-VZoFRIRtWw",
                amount: "10000000" // 0.01 TON
            }
        ]
    };

    try {
        await tonConnectUI.sendTransaction(transaction);
        activateShield();
    } catch (e) {
        alert("Оплату не підтверджено");
    }
}

// Логіка гри
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');
const timerElement = document.getElementById('timer');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

canvas.width = 800; canvas.height = 400;
let score = 0;
let isInvincible = false;
let shieldTimer = 0;

const player = { x: 50, y: 300, width: 30, height: 40, dx: 0, dy: 0, speed: 6, jump: -15, grounded: false };
const enemy = { x: 400, y: 205, width: 30, height: 30, speed: 3, range: 150, startX: 400 };
const platforms = [
    { x: 0, y: 380, width: 800, height: 20 },
    { x: 100, y: 280, width: 150, height: 15 },
    { x: 350, y: 240, width: 250, height: 15 },
    { x: 150, y: 140, width: 120, height: 15 },
    { x: 550, y: 140, width: 120, height: 15 }
];
let coins = [{x: 170, y: 240}, {x: 470, y: 200}, {x: 200, y: 100}, {x: 600, y: 100}].map(c => ({...c, collected: false}));

function activateShield() {
    isInvincible = true;
    shieldTimer = 10;
    timerElement.style.visibility = 'visible';
    let countdown = setInterval(() => {
        shieldTimer--;
        timerElement.innerText = `ЩИТ: ${shieldTimer}с`;
        if (shieldTimer <= 0) {
            isInvincible = false;
            timerElement.style.visibility = 'hidden';
            clearInterval(countdown);
        }
    }, 1000);
}

const keys = { Left: false, Right: false, Up: false };
const setupBtn = (id, key) => {
    const el = document.getElementById(id);
    el.ontouchstart = (e) => { e.preventDefault(); keys[key] = true; if(audioCtx.state==='suspended') audioCtx.resume(); };
    el.ontouchend = () => keys[key] = false;
};
setupBtn('leftBtn','Left'); setupBtn('rightBtn','Right'); setupBtn('jumpBtn','Up');

function update() {
    if (keys.Right) player.dx = player.speed;
    else if (keys.Left) player.dx = -player.speed;
    else player.dx *= 0.85;
    if (keys.Up && player.grounded) { player.dy = player.jump; player.grounded = false; }

    player.dy += 0.8; player.x += player.dx; player.y += player.dy;
    if (player.x < 0) player.x = 0; if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    enemy.x += enemy.speed;
    if (enemy.x > enemy.startX + enemy.range || enemy.x < enemy.startX) enemy.speed *= -1;

    if (player.x < enemy.x + enemy.width && player.x + player.width > enemy.x &&
        player.y < enemy.y + enemy.height && player.y + player.height > enemy.y) {
        if (isInvincible) {
            enemy.x = -100;
            setTimeout(() => { enemy.x = enemy.startX; }, 2000);
        } else {
            score = 0; scoreElement.innerText = score;
            player.x = 50; player.y = 300;
        }
    }

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.width && player.x + player.width > p.x &&
            player.y < p.y + p.height && player.y + player.height > p.y) {
            if (player.dy > 0 && player.y + player.height - player.dy <= p.y) {
                player.y = p.y - player.height; player.dy = 0; player.grounded = true;
            }
        }
    });

    coins.forEach(coin => {
        if (!coin.collected && player.x < coin.x + 20 && player.x + player.width > coin.x &&
            player.y < coin.y + 20 && player.y + player.height > coin.y) {
            coin.collected = true; score += 10; scoreElement.innerText = score;
        }
    });
    if (coins.every(c => c.collected)) coins.forEach(c => c.collected = false);
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    platforms.forEach(p => { ctx.fillStyle = '#2d6a4f'; ctx.fillRect(p.x, p.y, p.width, p.height); });
    ctx.fillStyle = '#ffd700';
    coins.forEach(c => { if(!c.collected) { ctx.beginPath(); ctx.arc(c.x+10, c.y+10, 8, 0, Math.PI*2); ctx.fill(); } });
    ctx.fillStyle = '#7d5fff'; ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
    ctx.globalAlpha = isInvincible ? (Math.sin(Date.now()/50)*0.5+0.5) : 1.0;
    ctx.fillStyle = '#e63946'; ctx.fillRect(player.x, player.y, player.width, player.height);
    if (isInvincible) { ctx.strokeStyle = '#00f2fe'; ctx.lineWidth = 3; ctx.strokeRect(player.x-5, player.y-5, player.width+10, player.height+10); }
    ctx.globalAlpha = 1.0;
}
update();
</script>
</body>
</html>
