<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Пригоди Тараса</title>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #a5f3fc; border: 4px solid #fff; border-radius: 8px; margin-top: 10px; }
        .stats { color: white; font-size: 24px; margin: 10px; }
    </style>
</head>
<body>
    <div class="stats">Зібрано скарбів: <span id="score">0</span></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

canvas.width = 800;
canvas.height = 400;

let score = 0;
const player = { x: 50, y: 300, width: 30, height: 40, dx: 0, dy: 0, speed: 5, jump: -12, grounded: false };
const platforms = [
    { x: 0, y: 380, width: 800, height: 20 },
    { x: 200, y: 280, width: 150, height: 20 },
    { x: 450, y: 200, width: 150, height: 20 }
];

// Додаємо монети
let coins = [
    { x: 260, y: 240, collected: false },
    { x: 510, y: 160, collected: false },
    { x: 100, y: 100, collected: false }
];

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function update() {
    if (keys['ArrowRight']) player.dx = player.speed;
    else if (keys['ArrowLeft']) player.dx = -player.speed;
    else player.dx *= 0.8;

    if (keys['Space'] && player.grounded) {
        player.dy = player.jump;
        player.grounded = false;
    }

    player.dy += 0.6; // Гравітація
    player.x += player.dx;
    player.y += player.dy;

    player.grounded = false;
    platforms.forEach(p => {
        if (player.x < p.x + p.width && player.x + player.width > p.x &&
            player.y < p.y + p.height && player.y + player.height > p.y) {
            if (player.dy > 0) {
                player.y = p.y - player.height;
                player.dy = 0;
                player.grounded = true;
            }
        }
    });

    // Перевірка збору монет
    coins.forEach(coin => {
        if (!coin.collected && player.x < coin.x + 20 && player.x + player.width > coin.x &&
            player.y < coin.y + 20 && player.y + player.height > coin.y) {
            coin.collected = true;
            score += 1;
            scoreElement.innerText = score;
        }
    });

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Платформи
    ctx.fillStyle = '#2d6a4f';
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.width, p.height));

    // Монети
    ctx.fillStyle = '#ffd700';
    coins.forEach(coin => {
        if (!coin.collected) {
            ctx.beginPath();
            ctx.arc(coin.x + 10, coin.y + 10, 8, 0, Math.PI*2);
            ctx.fill();
        }
    });

    // Тарас
    ctx.fillStyle = '#e63946';
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

update();
</script>
</body>
</html>
